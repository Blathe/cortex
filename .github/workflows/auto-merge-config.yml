name: Auto-merge agent config PRs

on:
  pull_request:
    branches: [master]
    paths: ['agent/**']

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Check risk label and auto-merge
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name')
          if echo "$LABELS" | grep -q "auto-merge"; then
            gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
          else
            echo "PR has 'needs-review' label — skipping auto-merge."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
