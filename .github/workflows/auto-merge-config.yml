name: Auto-merge agent config PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [master]
    paths: ['agent/**']

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Check risk label and auto-merge
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          HEAD_REF="${{ github.event.pull_request.head.ref }}"

          if ! echo "$HEAD_REF" | grep -q '^agent-config/'; then
            echo "Skipping: head ref is not agent-config/* ($HEAD_REF)"
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name')
          if ! echo "$LABELS" | grep -q '^auto-merge$'; then
            echo "Skipping: auto-merge label not present."
            exit 0
          fi
          if echo "$LABELS" | grep -q '^needs-review$'; then
            echo "Skipping: needs-review label present."
            exit 0
          fi

          FILES=$(gh pr view "$PR_NUMBER" --json files -q '.files[].path')
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if ! echo "$file" | grep -Eq '^agent/config/settings\.json$|^agent/logs/.*\.md$'; then
              echo "Skipping: PR includes non-agent-config file: $file"
              exit 0
            fi
          done <<< "$FILES"

          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
