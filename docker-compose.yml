services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortex-agent
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      GH_TOKEN: ${GH_TOKEN:-}
      GH_REPO: ${GH_REPO:-}
      CORTEX_SETUP_SECRET: ${CORTEX_SETUP_SECRET:-}
      CORTEX_TOKEN_ENCRYPTION_KEY: ${CORTEX_TOKEN_ENCRYPTION_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./agent:/app/agent

  ngrok:
    image: ngrok/ngrok:latest
    container_name: cortex-ngrok
    restart: unless-stopped
    depends_on:
      - agent
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Set NGROK_AUTHTOKEN in .env}
    command:
      - "http"
      - "agent:3000"
      - "--log=stdout"
    ports:
      - "4040:4040"
